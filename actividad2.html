<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 2: Librería de Validaciones</title>
    <link rel="stylesheet" href="css/actividad2.css">
</head>
<body>

    <div class="container">
        <section class="form-section">
            <h2>Iniciar Sesión</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label>Correo Electrónico:</label>
                    <input type="email" id="loginCorreo" required>
                </div>
                <div class="input-group">
                    <label>Contraseña:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit">Ingresar</button>
            </form>
        </section>

        <hr>

        <section class="form-section">
            <h2>Registro de Usuario</h2>
            <form id="registroForm">
                <div class="input-group">
                    <label>Nombre Completo (Solo letras):</label>
                    <input type="text" id="regNombre" required>
                </div>
                <div class="input-group">
                    <label>Número de Identificación (Max 10 dígitos):</label>
                    <input type="number" id="regId" required>
                </div>
                <div class="input-group">
                    <label>Fecha de Nacimiento:</label>
                    <input type="date" id="regFechaNac" required>
                </div>
                <div class="input-group">
                    <label>Correo Electrónico para Registro:</label>
                    <input type="email" id="regCorreo" required>
                </div>
                <div class="input-group">
                    <label>Contraseña para Registro (Robusta):</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit">Registrar</button>
            </form>

            <p id="edadResultado" class="info-text"></p>
            <p id="mensajeExito" style="color: #27ae60; font-weight: bold; margin-top: 10px; display: none; padding: 10px; background: #e8f8f5; border-radius: 5px;"></p>
        </section>

        <button id="btnAbrirModal" class="btn-modal">Ver Términos y Condiciones</button>
    </div>

    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h3>Términos y Condiciones</h3>
            <p>Para usar nuestra plataforma debes ser mayor de edad y aceptar que tus datos serán validados con nuestra propia librería JS nativa.</p>
            <button id="btnAceptarModal">Aceptar y Continuar</button>
        </div>
    </div>

    <script src="js/actividad2.js"></script>
</body>
</html>
