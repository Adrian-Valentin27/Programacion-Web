<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 13 - Calculadora de Edad</title>
    <link rel="stylesheet" href="css/ejercicio11.css">
</head>
<body>

    <div class="contenedor">
        <h1>¿Puedes Votar?</h1>

        <form id="formConversion">
            <div class="campo">
                <label for="edad">Ingresa tu edad:</label>
                <input type="number" id="edad" name="edad" placeholder="Ej: 20">
            </div>

            <p class="mensaje-error" id="mensajeError"></p>

            <button type="button" class="btn-convertir" id="btnConvertir">Verificar</button>

            <div class="campo">
                <label for="aprovar">Resultado:</label>
                <input type="text" id="aprovar" name="aprovar" readonly>
            </div>
        </form>
    </div>

    <script src="js/ejercicio13.js"></script>
</body>
</html>
