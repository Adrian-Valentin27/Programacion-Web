<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 15 - Estudiantes y Calificaciones</title>
    <link rel="stylesheet" href="css/ejercicio15.css">
</head>
<body>

    <div class="contenedor">
        <h1>Estudiantes y Calificaciones</h1>

        <form id="formEstudiantes">
            <div class="campo">
                <label for="nombre">Nombre del estudiante:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan">
            </div>

            <div class="campo">
                <label for="calificacion">Calificación:</label>
                <input type="text" id="calificacion" name="calificacion" placeholder="Ej: 85">
            </div>

            <p class="mensaje-error" id="mensajeError"></p>

            <button type="button" class="btn-convertir" id="btnAgregar">Agregar estudiante</button>

            <div class="campo">
                <label>Estudiantes agregados:</label>
                <ul id="listaEstudiantes"></ul>
            </div>

            <button type="button" class="btn-convertir" id="btnCalcular">Calcular</button>

            <div class="campo">
                <label for="promedio">Calificación promedio:</label>
                <input type="text" id="promedio" name="promedio" readonly>
            </div>

            <div class="campo">
                <label for="masAlta">Estudiante con calificación más alta:</label>
                <input type="text" id="masAlta" name="masAlta" readonly>
            </div>

            <div class="campo">
                <label for="masBaja">Estudiante con calificación más baja:</label>
                <input type="text" id="masBaja" name="masBaja" readonly>
            </div>
        </form>
    </div>

    <script src="js/ejercicio15.js"></script>
</body>
</html>
