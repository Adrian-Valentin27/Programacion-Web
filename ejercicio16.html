<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora con Funciones Flecha</title>
    <link rel="stylesheet" href="css/ejercicio16.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="calculator-card">
        <h2>Calculadora JS</h2>
        <div class="input-group">
            <input type="text" id="numero1" placeholder="Número 1">
            <input type="text" id="numero2" placeholder="Número 2">
        </div>

        <div class="button-group">
            <button onclick="calcularOperacion('suma')">+</button>
            <button onclick="calcularOperacion('resta')">-</button>
            <button onclick="calcularOperacion('multiplicacion')">×</button>
            <button onclick="calcularOperacion('division')">÷</button>
        </div>

        <input type="text" id="resultado" placeholder="Resultado" readonly>
    </div>

    <script src="js/ejercicio16.js"></script>
</body>
</html>
